services:
  web_corporativa:
    image: nginx:alpine
    container_name: cibersystems_portalWeb
    restart: always   # ¡La magia! Se reiniciará solo si la RPi se apaga.
    ports:
      - "80:80"       # Expone el puerto 80 al exterior
    volumes:
      - ./html:/usr/share/nginx/html:ro   # Monta tu web en modo solo lectura
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # Aplica el dominio

  db_vulnerable:
    image: mariadb:10.5
    container_name: cibersystems_db
    restart: always
    ports:
      - "3306:3306" # Puerto expuesto deliberadamente al exterior
    environment:
      MYSQL_ROOT_PASSWORD: CiberSystems
    volumes:
      # Le decimos que ejecute nuestro script al arrancar
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro